name: Deploy TEST app (test.lighthouse.career)

# 워크벤치(스테이징) — main push 시 자동 배포. apps/test → lighthouse-career-fe
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build test app
        run: pnpm --filter @lighthouse/test-app build
        env:
          VITE_API: https://api.lighthouse.career

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Sync to S3
        # uploads/ 는 진로달성 인증사진 prefix(같은 버킷) → --delete 제외
        run: aws s3 sync apps/test/dist/ s3://lighthouse-career-fe --delete --exclude "uploads/*"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EYU43VZ4GPE7Q \
            --paths "/*"
